name: Fetch Wikidata for CAPACOA Members

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:
  reload-wikidata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Fetch Wikidata data and build output graph
        run: bundle exec ruby src/reload_wikidata.rb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: capacoa-wikidata-jsonld
          path: output/capacoa-wikidata.jsonld

  commit-and-push:
    runs-on: ubuntu-latest
    needs: reload-wikidata

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: capacoa-wikidata-jsonld
          path: output/

      - name: Commit and push if changed
        run: |
          git pull
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add output/capacoa-wikidata.jsonld
          if ! git diff --cached --quiet; then
            git commit -m "Update CAPACOA Wikidata graph (venues, social media, images)"
            git push
          else
            echo "No changes to commit."
          fi

  artsdata-push:
    runs-on: ubuntu-latest
    needs: commit-and-push

    steps:
      - name: Push to Artsdata Databus
        uses: culturecreates/artsdata-pipeline-action@v3
        with:
          artifact: capacoa-wikidata
          publisher: "${{ secrets.PUBLISHER_URI_GREGORY }}"
          downloadUrl: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref }}/output/capacoa-wikidata.jsonld"